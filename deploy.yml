apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app: zomato
  name: zomato-deploy
spec:
  replicas: 2
  selector:
    matchLabels:
      app: zomato
  template:
    metadata:
      labels:
        app: zomato
    spec:
      containers:
name: cont1
        image: likithreddy/nodejsimage:d4ee6658fde6f3d429780dabc71c123d283f0541
        ports:
containerPort: 8080
---
apiVersion: v1
kind: Service
metadata:
  name: abc
spec:
  type: NodePort
  selector:
    app: zomato
  ports:
port: 8080
      nodePort: 31111
